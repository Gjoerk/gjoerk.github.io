<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./favicon.png">
    <title>TradeUpEngine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* --- STRICT COLOR PALETTE (DARK ONLY) --- */
        :root {
            --bg-core: #000000;
            --bg-card: #111111;
            --bg-input: #1a1a1a;
            --bg-badge: #222222;
            --border-color: #333333;
            --text-main: #ffffff;
            --text-muted: #bbbbbb; 
            --shadow-color: rgba(0,0,0,0.5);
            
            /* ACCENTS */
            --color-pink: #e056fd; 
            --color-green: #00ff9d;
            --color-coffee: #FFDD00;
            
            --bs-body-bg: var(--bg-core);
            --bs-body-color: var(--text-main);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-core);
            background-image: radial-gradient(circle at 50% 0%, #1c1c1c 0%, #000000 85%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* --- UI COMPONENTS --- */
        .card-clean {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        hr { border-color: var(--border-color); opacity: 1; }

        .form-control, .form-select {
            background-color: var(--bg-input) !important;
            border: 1px solid var(--border-color) !important;
            color: #fff !important;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: none !important;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            border-color: var(--color-pink) !important;
            background-color: #222 !important;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
        
        .label-desc {
            text-transform: none;
            font-weight: 400;
            opacity: 0.7;
            font-size: 0.7rem;
            letter-spacing: 0;
            margin-left: 5px;
        }

        /* --- BUTTONS --- */
        .btn-pink {
            background-color: var(--color-pink);
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-pink:hover {
            background-color: #d046ec;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(224, 86, 253, 0.3);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .btn-outline:hover {
            border-color: #fff;
            color: #fff;
        }

        /* --- BUY ME A COFFEE FLOATING BUTTON --- */
        .bmc-floating-button {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 9999;
            background-color: var(--color-coffee);
            border-radius: 50px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #000000;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .bmc-floating-button:hover {
            transform: scale(1.05);
            color: #000000;
        }
        .bmc-floating-button img {
            width: 24px;
            margin-right: 8px;
        }

        /* --- RESULT CARDS --- */
        .result-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--border-color); 
            border-radius: 6px;
            margin-bottom: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .result-card:hover {
            background-color: #161616;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .status-profit { border-left-color: var(--color-green); }
        .status-jackpot { border-left-color: var(--color-pink); }

        .text-green { color: var(--color-green) !important; }
        .text-pink { color: var(--color-pink) !important; text-shadow: 0 0 15px rgba(224, 86, 253, 0.3); }
        .text-white { color: #ffffff !important; }
        .text-grey { color: var(--text-muted) !important; }

        .badge-mode {
            background: #222;
            color: #fff;
            border: 1px solid #333;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        .badge-jackpot {
            background: rgba(224, 86, 253, 0.15);
            color: var(--color-pink);
            border: 1px solid var(--color-pink);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-left: 8px;
        }

        .badge-st {
            background: #cf6a32;
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-left: 8px;
        }

        .rarity-badge {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid;
            font-weight: 600;
        }
        .rarity-Consumer { color: #b0c3d9; border-color: #b0c3d9; }
        .rarity-Industrial { color: #5e98d9; border-color: #5e98d9; }
        .rarity-Mil-Spec { color: #4b69ff; border-color: #4b69ff; }
        .rarity-Restricted { color: #8847ff; border-color: #8847ff; }
        .rarity-Classified { color: #d32ce6; border-color: #d32ce6; }

        .outcomes-container {
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            display: none;
        }
        
        .outcome-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid #1a1a1a;
        }
        .outcome-row:last-child { border-bottom: none; }

        .tag-win { color: var(--color-green); font-weight: 700; min-width: 40px; }
        .tag-loss { color: #444; font-weight: 700; min-width: 40px; }

        .expand-link {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            text-decoration: none;
            border-bottom: 1px dotted #555;
            cursor: pointer;
            transition: color 0.2s;
        }
        .expand-link:hover { color: #fff; border-color: #fff; }

        /* Custom Checkboxes */
        .form-check-input {
            background-color: var(--bg-input);
            border-color: var(--border-color);
        }
        .form-check-input:checked {
            background-color: var(--color-pink);
            border-color: var(--color-pink);
        }
        .form-check-input.st-checkbox:checked {
            background-color: #cf6a32;
            border-color: #cf6a32;
        }

        /* Saved Items Hover Effect */
        .saved-item-header {
            transition: background-color 0.2s;
        }
        .saved-item-header:hover {
            background-color: #222;
        }
        .chevron-icon {
            display: inline-block;
            transition: transform 0.2s;
            font-size: 0.6rem;
            color: #888;
            margin-right: 4px;
        }
        .chevron-open { transform: rotate(90deg); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-core); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>

    <span>Buy me a coffee</span>
