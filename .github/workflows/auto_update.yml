name: Täglicher Preis-Update Bot

# Wann soll das Skript starten?
on:
  schedule:
    - cron: '0 4 * * *' # Jeden Tag um 04:00 Uhr nachts (Weltzeit)
  workflow_dispatch: # Erlaubt es dir, das Update auf GitHub auch manuell per Knopfdruck zu starten

jobs:
  update-prices:
    runs-on: ubuntu-latest # Ein kleiner Linux-Server

    steps:
    - name: Repository herunterladen
      uses: actions/checkout@v3

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Python Skript ausführen
      env:
        STEAMAPI_KEY: ${{ secrets.STEAMAPI_KEY }} # Holt den geheimen Key aus Schritt 2
      run: python price_update.py

    - name: Neue Preise auf GitHub speichern
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Update Bot"
        git add prices_cache.json
        # Verhindert einen Absturz, falls sich die Preise heute mal nicht geändert haben
        git commit -m "🤖 Auto-Update: Neue Steam Preise geladen" || echo "Keine neuen Preise zum Hochladen."
        git push
